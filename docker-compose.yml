services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mqttstat-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mqtt/data:/mosquitto/data
      - ./infra/mqtt/log:/mosquitto/log

  db:
    image: postgres:16-alpine
    container_name: mqttstat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mqttstat}
      POSTGRES_USER: ${POSTGRES_USER:-mqttstat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mqttstat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mqttstat-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mqttstat}:${POSTGRES_PASSWORD:-mqttstat}@db:5432/${POSTGRES_DB:-mqttstat}
    depends_on:
      - db
      - mosquitto
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mqttstat-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  pg_data:
